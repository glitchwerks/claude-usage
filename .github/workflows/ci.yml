name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Pytest
        run: uv run pytest

  skill-smoke-ubuntu:
    name: Skill Smoke (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Skill smoke test
        env:
          CLAUDE_PROSPECTOR_PIP_SPEC: ${{ github.workspace }}
        run: uv run pytest tests/integration/test_setup_skill.py -v

  skill-smoke-windows:
    name: Skill Smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Skill smoke test
        env:
          CLAUDE_PROSPECTOR_PIP_SPEC: ${{ github.workspace }}
        run: uv run pytest tests/integration/test_setup_skill.py -v
